version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: pixel-db
    restart: always
    environment:
      POSTGRES_DB: pixel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  rabbitmq:
    image: rabbitmq:3-management
    container_name: pixel-rabbit
    restart: always
    ports: 
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data:
    driver: local
